    <path d="M0,0 L-36,-14 A42,42 0 0,0 -42,0 Z" fill="url(#debridge-gradient)" opacity="0.8"/>
  </g>
  <!-- Body -->
  <path d="M60 18 C35 18 22 38 22 55 C22 72 35 88 47 92 L47 100 L54 100 L54 93 C54 93 58 95 64 93 L64 100 L71 100 L71 92 C83 88 96 72 96 55 C96 38 83 18 60 18Z" fill="url(#lobster-gradient)"/>
